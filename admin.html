<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sts. Joachim and Anne</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-style.css">
    <!-- PWA: Admin-only manifest -->
    <link rel="manifest" href="/admin-manifest.json">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SJACS Admin">
    <link rel="apple-touch-icon" href="/images/logo.png">
</head>
<body class="admin-login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="images/logo.png" alt="School Logo" height="80" class="mb-3">
                <h3 class="fw-bold">Admin Portal</h3>
                <p class="text-muted">Sign in to manage the school website</p>
            </div>
            
            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required placeholder="Enter username">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-login">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner" role="status"></span>
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
